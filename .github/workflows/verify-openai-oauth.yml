name: Verify OpenAI OAuth

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Certification profile
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - full

jobs:
  verification:
    runs-on:
      - self-hosted
      - macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run offline suite
        run: bun run verify:offline

      - name: Run OpenAI OAuth certification
        id: verify
        env:
          RUN_LIVE_PROVIDER_TESTS: "1"
        run: |
          set -euo pipefail
          profile="${{ inputs.profile || 'smoke' }}"
          output_dir="$RUNNER_TEMP/verify-live-openai-oauth"
          mkdir -p "$output_dir"

          set +e
          bun run verify:live -- --profile "$profile" --output-dir "$output_dir" openai | tee "$output_dir/verify-live.log"
          status_code=${PIPESTATUS[0]}
          set -e

          summary_line="$(grep '^- openai:' "$output_dir/verify-live.log" | tail -n 1 | sed 's/^- openai: //')"
          if [ -z "$summary_line" ]; then
            summary_line="failed (summary unavailable)"
          fi
          echo "summary_line=$summary_line" >> "$GITHUB_OUTPUT"
          exit $status_code

      - name: Upload OpenAI OAuth certification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-oauth-live-certification
          path: ${{ runner.temp }}/verify-live-openai-oauth

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## OpenAI OAuth Verification Summary"
            echo "- OpenAI: ${{ steps.verify.outputs.summary_line || steps.verify.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
