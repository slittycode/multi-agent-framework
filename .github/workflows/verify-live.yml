name: Verify Live

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Certification profile
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - full
  schedule:
    - cron: "0 0 * * *"

jobs:
  offline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run offline suite
        run: bun run verify:offline

  gemini:
    needs: offline
    runs-on: ubuntu-latest
    outputs:
      summary_line: ${{ steps.verify.outputs.summary_line }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Gemini certification
        id: verify
        env:
          RUN_LIVE_PROVIDER_TESTS: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          profile="${{ inputs.profile || 'smoke' }}"
          output_dir="$RUNNER_TEMP/verify-live-gemini"
          mkdir -p "$output_dir"

          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "summary_line=skipped (GEMINI_API_KEY secret is not configured)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          bun run verify:live -- --profile "$profile" --output-dir "$output_dir" gemini | tee "$output_dir/verify-live.log"
          status_code=${PIPESTATUS[0]}
          set -e

          summary_line="$(grep '^- gemini:' "$output_dir/verify-live.log" | tail -n 1 | sed 's/^- gemini: //')"
          if [ -z "$summary_line" ]; then
            summary_line="failed (summary unavailable)"
          fi
          echo "summary_line=$summary_line" >> "$GITHUB_OUTPUT"
          exit $status_code

      - name: Upload Gemini certification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-live-certification
          path: ${{ runner.temp }}/verify-live-gemini

  kimi:
    needs: offline
    runs-on: ubuntu-latest
    outputs:
      summary_line: ${{ steps.verify.outputs.summary_line }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Kimi certification
        id: verify
        env:
          RUN_LIVE_PROVIDER_TESTS: "1"
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
        run: |
          set -euo pipefail
          profile="${{ inputs.profile || 'smoke' }}"
          output_dir="$RUNNER_TEMP/verify-live-kimi"
          mkdir -p "$output_dir"

          if [ -z "${KIMI_API_KEY:-}" ]; then
            echo "summary_line=skipped (KIMI_API_KEY secret is not configured)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          bun run verify:live -- --profile "$profile" --output-dir "$output_dir" kimi | tee "$output_dir/verify-live.log"
          status_code=${PIPESTATUS[0]}
          set -e

          summary_line="$(grep '^- kimi:' "$output_dir/verify-live.log" | tail -n 1 | sed 's/^- kimi: //')"
          if [ -z "$summary_line" ]; then
            summary_line="failed (summary unavailable)"
          fi
          echo "summary_line=$summary_line" >> "$GITHUB_OUTPUT"
          exit $status_code

      - name: Upload Kimi certification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kimi-live-certification
          path: ${{ runner.temp }}/verify-live-kimi

  summary:
    if: always()
    needs:
      - offline
      - gemini
      - kimi
    runs-on: ubuntu-latest

    steps:
      - name: Publish summary
        run: |
          {
            echo "## Verification Summary"
            echo "- Offline suite: ${{ needs.offline.result }}"
            echo "- Gemini: ${{ needs.gemini.outputs.summary_line || needs.gemini.result }}"
            echo "- Kimi: ${{ needs.kimi.outputs.summary_line || needs.kimi.result }}"
            echo "- OpenAI ChatGPT OAuth: run \`.github/workflows/verify-openai-oauth.yml\` on the self-hosted macOS runner"
          } >> "$GITHUB_STEP_SUMMARY"
